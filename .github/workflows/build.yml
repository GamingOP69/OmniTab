name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    
    - name: Build with Maven
      run: mvn clean package --file pom.xml

    - name: Get Version
      id: get_version
      run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_OUTPUT

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.VERSION }}-latest
        name: v${{ steps.get_version.outputs.VERSION }} (Latest Build)
        body: |
          ## OmniTab v${{ steps.get_version.outputs.VERSION }} - Automated Development Build
          
          This is an automated build of the latest code from the `main` branch.
          
          ### Key Features:
          - **Universal Support**: 1.8.8 to 1.21.1
          - **Elite RGB**: Dynamic Gradients and Hex support
          - **Staff Stealth**: Native Vanish integration
          - **High Performance**: Asynchronous animation engine
          
          **Note**: This release is automatically updated on every push to `main`.
        files: omnitab-core/target/omnitab-core-*.jar
        draft: false
        prerelease: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

