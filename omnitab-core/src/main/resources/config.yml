# OmniTab Main Configuration

settings:
  language: "en"
  # Automatically check for and download updates on startup
  auto_update: false
  check_for_updates: true
  metrics_enabled: true
  debug_mode: false

tablist:
  update_interval: 10
  header:
    - "&e&lOmniTab &7- &f%plugin_version%"
    - " "
    - "&7Ping: &f%player_ping%ms &7| &7Server: &f%online_players%/%max_players%"
    - " "
  footer:
    - " "
    - "&bJoin our Discord: &fdiscord.gg/omnitab"
  
  groups:
    admin:
      header:
        - "&c&lSTAFF TABLIST"
        - "&7You are in &cAdmin Mode"
      footer:
        - "&7TPS: &a%server_tps% &7| &7RAM: &f%server_ram%"
  
  sorting:
    groups:
      owner:
        priority: 0
        permission: "omnitab.owner"
        prefix: "&#FFD700[Owner] "
      admin:
        priority: 1
        permission: "omnitab.admin"
        prefix: "&#FF4500[Admin] "
      default:
        priority: 100
        permission: "omnitab.default"
        prefix: "&7"
